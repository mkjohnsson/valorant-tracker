<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valorant Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --red: #FF4655;
      --red-dark: #cc2233;
      --bg: #0f1115;
      --bg2: #161a1f;
      --bg3: #1e2329;
      --border: #2a2f38;
      --text: #e8eaed;
      --muted: #8b9099;
      --win: #4caf50;
      --loss: #FF4655;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 2px solid var(--red);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo-val { color: var(--text); }
    .logo-tracker { color: var(--red); }

    .logo-slash {
      width: 3px;
      height: 28px;
      background: var(--red);
      transform: skewX(-15deg);
      margin: 0 4px;
    }

    /* ── Main container ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── Search ── */
    .search-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .search-box h2 {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 200px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 16px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus { border-color: var(--red); }

    .search-row select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      cursor: pointer;
    }

    .search-row button {
      background: var(--red);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 24px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .search-row button:hover { background: var(--red-dark); }
    .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      background: rgba(255, 70, 85, 0.12);
      border: 1px solid var(--red);
      border-radius: 6px;
      color: var(--red);
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
    }

    /* ── Card grid ── */
    .section-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    /* ── Profile card ── */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .player-card-img {
      width: 96px;
      height: 96px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid var(--border);
      background: var(--bg3);
    }

    .player-card-img.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--muted);
    }

    .profile-info h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .profile-info .tag {
      color: var(--muted);
      font-size: 18px;
      font-weight: 400;
    }

    .profile-info .level-badge {
      display: inline-block;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--muted);
      padding: 3px 12px;
      margin-top: 8px;
    }

    .profile-info .level-badge span { color: var(--text); font-weight: 600; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      text-align: center;
    }

    .stat-card .stat-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .rank-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .rank-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .rank-info .tier-name {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rank-info .rr-val {
      font-size: 14px;
      color: var(--muted);
    }

    .rank-info .rr-change {
      font-size: 13px;
      font-weight: 600;
    }

    .rr-change.pos { color: var(--win); }
    .rr-change.neg { color: var(--loss); }

    .stat-big {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Chart ── */
    .chart-card {
      margin-bottom: 20px;
    }

    .chart-wrapper {
      height: 200px;
      position: relative;
    }

    /* ── Matches ── */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .match-row {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: grid;
      grid-template-columns: 48px 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }

    .match-row:hover { border-color: var(--red); }

    .match-row.win { border-left: 3px solid var(--win); }
    .match-row.loss { border-left: 3px solid var(--loss); }

    .agent-icon {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--bg2);
    }

    .match-main .map-name {
      font-size: 15px;
      font-weight: 600;
    }

    .match-main .match-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .result-badge {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .result-badge.win { background: rgba(76,175,80,0.15); color: var(--win); }
    .result-badge.loss { background: rgba(255,70,85,0.15); color: var(--loss); }

    .kda {
      font-size: 14px;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }

    .kda .kda-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 400;
    }

    .rr-delta {
      font-size: 14px;
      font-weight: 600;
      text-align: right;
      min-width: 48px;
    }

    .rr-delta.pos { color: var(--win); }
    .rr-delta.neg { color: var(--loss); }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { display: none; }

    /* ── Empty state ── */
    .empty-hint {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-hint .big-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
    .empty-hint p { font-size: 16px; }
  </style>
</head>
<body>

<header>
  <div class="logo-slash"></div>
  <div class="logo-text">
    <span class="logo-val">VALORANT</span>
    <span class="logo-tracker"> TRACKER</span>
  </div>
</header>

<main>
  <!-- Search -->
  <div class="search-box">
    <h2>Sök spelare</h2>
    <div class="search-row">
      <input type="text" id="playerInput" placeholder="SpelareNamn#TAG" autocomplete="off" />
      <select id="regionSelect">
        <option value="eu" selected>EU</option>
        <option value="na">NA</option>
        <option value="ap">AP</option>
        <option value="kr">KR</option>
        <option value="latam">LATAM</option>
        <option value="br">BR</option>
      </select>
      <button id="searchBtn" onclick="search()">Sök</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Hämtar data...</p>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Profile -->
    <div class="section-label">Spelare</div>
    <div class="card profile-card" style="margin-bottom:20px">
      <div id="playerCardImg"></div>
      <div class="profile-info">
        <h1 id="playerName">—</h1>
        <div class="level-badge">Nivå <span id="playerLevel">—</span></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="section-label">Stats</div>
    <div class="stats-row">
      <!-- Rank card -->
      <div class="stat-card">
        <div class="stat-label">Nuvarande rank</div>
        <div class="rank-display" id="rankDisplay">
          <div style="color:var(--muted);font-size:13px">Ingen rankad data</div>
        </div>
      </div>
      <!-- Win rate -->
      <div class="stat-card">
        <div class="stat-label">Vinstandel (senaste 10)</div>
        <div class="stat-big" id="winRate">—</div>
        <div class="stat-sub" id="winRateSub">av 10 matcher</div>
      </div>
      <!-- KDA -->
      <div class="stat-card">
        <div class="stat-label">Snitt K/D/A (senaste 10)</div>
        <div class="stat-big" id="avgKda">—</div>
        <div class="stat-sub">kills / deaths / assists</div>
      </div>
    </div>

    <!-- Rank history chart -->
    <div class="section-label">RR-historik (senaste matcher)</div>
    <div class="card chart-card">
      <div class="chart-wrapper">
        <canvas id="rrChart"></canvas>
      </div>
    </div>

    <!-- Matches -->
    <div class="section-label">Senaste matcher</div>
    <div class="matches-list" id="matchesList"></div>
  </div>

  <!-- Empty state -->
  <div class="empty-hint" id="emptyState">
    <div class="big-icon">🎯</div>
    <p>Skriv in ett spelarnamn och klicka Sök</p>
  </div>
</main>

<script>
let rrChartInstance = null;

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('searchBtn').disabled = on;
}

async function search() {
  const raw = document.getElementById('playerInput').value.trim();
  const region = document.getElementById('regionSelect').value;

  if (!raw) return;

  const parts = raw.split('#');
  if (parts.length !== 2) {
    showError('Ange spelarnamn i formatet  Namn#TAG');
    return;
  }

  const [name, tag] = parts;
  hideError();
  setLoading(true);
  document.getElementById('results').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    const r = await fetch(`/api/player/${region}/${encodeURIComponent(name)}/${encodeURIComponent(tag)}`);
    const json = await r.json();
    if (!r.ok) {
      showError(json.error || `Fel ${r.status} — kontrollera att spelarnamnet stämmer.`);
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    renderResults(json, name, tag);
  } catch (e) {
    showError('Nätverksfel — försök igen.');
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    setLoading(false);
  }
}

// Enter key
document.getElementById('playerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

function renderResults(data, name, tag) {
  const { account, mmr, mmrHistory, matches } = data;

  // ── Profile ──
  const accData = account?.data;
  document.getElementById('playerName').textContent =
    (accData?.name || name) + '#' + (accData?.tag || tag);
  document.getElementById('playerLevel').textContent = accData?.account_level ?? '?';

  const cardEl = document.getElementById('playerCardImg');
  const cardUrl = accData?.card?.small || accData?.card?.large;
  if (cardUrl) {
    cardEl.innerHTML = `<img class="player-card-img" src="${cardUrl}" alt="Player card" onerror="this.style.display='none'" />`;
  } else {
    cardEl.innerHTML = `<div class="player-card-img placeholder">🎮</div>`;
  }

  // ── Rank ──
  const mmrData = mmr?.data?.current;
  const rankEl = document.getElementById('rankDisplay');
  if (mmrData) {
    const tier = mmrData.tier?.name || 'Unranked';
    const rr = mmrData.rr ?? 0;
    const lastChange = mmrData.last_change ?? null;
    const iconUrl = mmrData.tier?.icon;

    const changeHtml = lastChange != null
      ? `<div class="rr-change ${lastChange >= 0 ? 'pos' : 'neg'}">${lastChange >= 0 ? '+' : ''}${lastChange} RR</div>`
      : '';

    rankEl.innerHTML = `
      ${iconUrl ? `<img class="rank-icon" src="${iconUrl}" alt="${tier}" />` : ''}
      <div class="rank-info">
        <div class="tier-name">${tier}</div>
        <div class="rr-val">${rr} RR</div>
        ${changeHtml}
      </div>
    `;
  } else {
    rankEl.innerHTML = `<div style="color:var(--muted);font-size:13px">Ingen rankad data</div>`;
  }

  // ── Win rate + KDA from matches (pre-processed by server) ──
  const matchList = Array.isArray(matches) ? matches : [];
  const played = matchList.filter(m => m.me);
  const wins = played.filter(m => m.won).length;
  const totalK = played.reduce((s, m) => s + (m.me?.kills ?? 0), 0);
  const totalD = played.reduce((s, m) => s + (m.me?.deaths ?? 1), 0);
  const totalA = played.reduce((s, m) => s + (m.me?.assists ?? 0), 0);
  const matchCount = played.length;

  document.getElementById('winRate').textContent = matchCount ? `${wins}/${matchCount}` : '—';
  document.getElementById('winRateSub').textContent = matchCount ? `av ${matchCount} matcher` : '';

  if (matchCount > 0) {
    document.getElementById('avgKda').textContent =
      `${(totalK/matchCount).toFixed(1)}/${(totalD/matchCount).toFixed(1)}/${(totalA/matchCount).toFixed(1)}`;
  } else {
    document.getElementById('avgKda').textContent = '—';
  }

  // ── Rank history chart ──
  renderChart(mmrHistory?.data?.history || []);

  // ── Matches list ──
  renderMatches(matchList);

  document.getElementById('results').style.display = 'block';
}

function renderChart(history) {
  // history is newest-first, we want oldest-first for chart
  const points = [...history].reverse().slice(-15);

  const labels = points.map((_, i) => `Match ${i + 1}`);
  const values = points.map(p => {
    // Try to get cumulative RR or mmr_change_to_last_game
    return p.ranking_in_tier ?? p.rr ?? 0;
  });

  if (rrChartInstance) {
    rrChartInstance.destroy();
    rrChartInstance = null;
  }

  if (points.length < 2) {
    document.querySelector('.chart-wrapper').innerHTML =
      '<div style="text-align:center;padding:60px;color:var(--muted);font-size:13px">Inte tillräckligt med rankade matcher för att visa historik</div>';
    return;
  }

  // Recreate canvas (needed after innerHTML replacement)
  const wrapper = document.querySelector('.chart-wrapper');
  wrapper.innerHTML = '<canvas id="rrChart"></canvas>';
  const ctx = document.getElementById('rrChart').getContext('2d');

  rrChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'RR',
        data: values,
        borderColor: '#FF4655',
        backgroundColor: 'rgba(255,70,85,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#FF4655',
        pointRadius: 4,
        tension: 0.3,
        fill: true,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: '#8b9099', font: { size: 11 } },
          grid: { color: '#2a2f38' },
        },
        y: {
          ticks: { color: '#8b9099', font: { size: 11 } },
          grid: { color: '#2a2f38' },
        },
      },
    },
  });
}

function renderMatches(matchList) {
  const container = document.getElementById('matchesList');
  container.innerHTML = '';

  const played = matchList.filter(m => m.me);
  if (!played.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:16px">Inga rankade matcher hittades</div>';
    return;
  }

  for (const m of played) {
    const { won, rr_change, me, map, started_at } = m;

    let dateStr = '';
    if (started_at) {
      const d = new Date(started_at);
      dateStr = d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
    }

    let rrHtml = '';
    if (rr_change != null) {
      const cls = rr_change >= 0 ? 'pos' : 'neg';
      rrHtml = `<div class="rr-delta ${cls}">${rr_change >= 0 ? '+' : ''}${rr_change}</div>`;
    } else {
      rrHtml = '<div class="rr-delta" style="color:var(--muted)">—</div>';
    }

    const row = document.createElement('div');
    row.className = `match-row ${won ? 'win' : 'loss'}`;
    row.innerHTML = `
      ${me.agent_icon
        ? `<img class="agent-icon" src="${me.agent_icon}" alt="${me.character}" title="${me.character}" onerror="this.style.display='none'" />`
        : `<div class="agent-icon" style="display:flex;align-items:center;justify-content:center;font-size:20px">🎮</div>`
      }
      <div class="match-main">
        <div class="map-name">${map}</div>
        <div class="match-date">${me.character}${dateStr ? ' · ' + dateStr : ''}</div>
      </div>
      <div class="result-badge ${won ? 'win' : 'loss'}">${won ? 'WIN' : 'LOSS'}</div>
      <div class="kda">
        ${me.kills}/${me.deaths}/${me.assists}
        <div class="kda-label">K/D/A</div>
      </div>
      ${rrHtml}
    `;
    container.appendChild(row);
  }
}
</script>
</body>
</html>
